                - Orphan
                - Delete
                type: string
              forProvider:
                description: InstanceMappingParameters are the configurable fields
                  of an InstanceMapping.
                properties:
                  adminCredentialsSecretRef:
                    description: AdminCredentialsSecretRef references a Secret containing
                      admin API credentials
                    properties:
                      key:
                        description: |-
                          Key is the key in the secret containing the JSON credentials.
                          The JSON must contain: {"baseurl": "...", "uaa": {"url": "...", "clientid": "...", "clientsecret": "..."}}
                        type: string
                      name:
                        description: Name is the name of the Secret
                        type: string
                      namespace:
                        description: Namespace is the namespace of the Secret
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                  isDefault:
                    default: false
                    description: IsDefault sets this mapping as the default for the
                      primary ID
                    type: boolean
                  platform:
                    description: Platform is the deployment platform ("kubernetes",
                      "cloudfoundry", or "subaccount-api-access")
                    enum:
